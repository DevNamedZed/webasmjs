<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>webasmjs Playground</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1e1e2e;
    color: #cdd6f4;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 20px;
    background: #181825;
    border-bottom: 1px solid #313244;
    flex-shrink: 0;
  }

  header h1 {
    font-size: 18px;
    font-weight: 600;
    color: #cba6f7;
  }

  .header-sep {
    width: 1px;
    height: 24px;
    background: #45475a;
  }

  #examplesBtn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid #45475a;
    background: #313244;
    color: #cdd6f4;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  #examplesBtn:hover {
    background: #45475a;
    border-color: #585b70;
  }

  #examplesBtn .arrow {
    font-size: 10px;
    opacity: 0.6;
  }

  #currentExample {
    color: #89b4fa;
    font-weight: 500;
  }

  #runBtn {
    padding: 6px 20px;
    border-radius: 6px;
    border: none;
    background: #a6e3a1;
    color: #1e1e2e;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  #runBtn:hover { background: #94e2d5; }

  .hint {
    color: #6c7086;
    font-size: 12px;
    margin-left: auto;
  }

  .github-link {
    display: flex;
    align-items: center;
    gap: 6px;
    color: #6c7086;
    text-decoration: none;
    font-size: 13px;
    transition: color 0.15s;
    padding: 4px 0;
  }

  .github-link:hover { color: #cdd6f4; }

  .github-link svg {
    width: 18px;
    height: 18px;
    fill: currentColor;
  }

  /* ─── Main split view ─── */

  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  .editor-pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 200px;
  }

  .pane-header {
    padding: 8px 16px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: #a6adc8;
    background: #181825;
    border-bottom: 1px solid #313244;
    flex-shrink: 0;
  }

  .lang-toggle {
    display: flex;
    gap: 2px;
    background: #313244;
    border-radius: 4px;
    padding: 2px;
  }

  .lang-btn {
    padding: 2px 10px;
    border-radius: 3px;
    border: none;
    background: transparent;
    color: #6c7086;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }

  .lang-btn:hover { color: #a6adc8; }

  .lang-btn.active {
    background: #45475a;
    color: #cdd6f4;
  }

  #editor {
    flex: 1;
    width: 100%;
    padding: 16px;
    background: #1e1e2e;
    color: #cdd6f4;
    border: none;
    resize: none;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 13px;
    line-height: 1.6;
    tab-size: 2;
    outline: none;
  }

  /* ─── Resize handle ─── */

  .resize-handle {
    width: 4px;
    cursor: col-resize;
    background: #313244;
    flex-shrink: 0;
    transition: background 0.15s;
  }

  .resize-handle:hover,
  .resize-handle.active {
    background: #89b4fa;
  }

  /* ─── WAT pane (right, collapsible) ─── */

  .wat-pane {
    display: flex;
    flex-direction: column;
    min-width: 0;
    width: 40%;
    max-width: 50%;
    transition: width 0.15s;
  }

  .wat-pane.collapsed {
    width: auto;
    max-width: none;
    border-left: 1px solid #313244;
  }

  .wat-pane.collapsed .wat-body {
    display: none;
  }

  .main:has(.wat-pane.collapsed) > .resize-handle {
    display: none;
  }

  .pane-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 16px;
    background: #181825;
    border-bottom: 1px solid #313244;
    cursor: pointer;
    user-select: none;
    flex-shrink: 0;
  }

  .pane-toggle:hover { background: #1e1e2e; }

  .pane-chevron {
    font-size: 10px;
    color: #6c7086;
    transition: transform 0.2s;
    display: inline-block;
  }

  .collapsed .pane-chevron {
    transform: rotate(-90deg);
  }

  .pane-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: #a6adc8;
  }

  .pane-clear {
    margin-left: auto;
    padding: 2px 8px;
    border-radius: 4px;
    border: 1px solid #45475a;
    background: transparent;
    color: #6c7086;
    font-size: 11px;
    cursor: pointer;
    font-family: inherit;
  }

  .pane-clear:hover {
    background: #313244;
    color: #a6adc8;
  }

  .wat-body {
    flex: 1;
    overflow: auto;
    padding: 0;
  }

  /* ─── Module cards inside WAT pane ─── */

  .module-card {
    border-bottom: 1px solid #313244;
  }

  .module-card:last-child { border-bottom: none; }

  .module-card-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    background: #181825;
  }

  .module-card-name {
    font-size: 12px;
    font-weight: 600;
    color: #cba6f7;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  }

  .module-card-actions {
    margin-left: auto;
    display: flex;
    gap: 4px;
  }

  .download-btn {
    padding: 1px 6px;
    border-radius: 3px;
    border: 1px solid #45475a;
    background: transparent;
    color: #6c7086;
    font-size: 10px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }

  .download-btn:hover {
    background: #313244;
    color: #a6adc8;
    border-color: #585b70;
  }

  .module-card-wat {
    padding: 12px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 12px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-all;
    color: #a6e3a1;
  }

  .module-card-wat.error { color: #f38ba8; }

  /* ─── Output pane (bottom, collapsible) ─── */

  .output-pane {
    flex-shrink: 0;
    background: #181825;
    border-top: 1px solid #313244;
    display: flex;
    flex-direction: column;
  }

  .output-body {
    overflow: auto;
    padding: 8px 16px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 13px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-all;
    color: #cdd6f4;
    height: 180px;
  }

  .collapsed .output-body {
    display: none;
  }

  .output-body .error { color: #f38ba8; }
  .output-body .success { color: #a6e3a1; }

  /* ─── Example Picker Dialog ─── */

  .dialog-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    backdrop-filter: blur(4px);
  }

  .dialog {
    background: #1e1e2e;
    border: 1px solid #45475a;
    border-radius: 12px;
    width: 840px;
    max-width: 90vw;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    box-shadow: 0 24px 48px rgba(0, 0, 0, 0.4);
  }

  .dialog-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid #313244;
    flex-shrink: 0;
  }

  .dialog-header h2 {
    font-size: 16px;
    font-weight: 600;
    color: #cdd6f4;
    margin-bottom: 12px;
  }

  .dialog-search {
    width: 100%;
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid #45475a;
    background: #313244;
    color: #cdd6f4;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }

  .dialog-search::placeholder { color: #6c7086; }
  .dialog-search:focus { border-color: #89b4fa; }

  .dialog-search-row {
    display: flex;
    gap: 8px;
  }

  .filter-select {
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid #45475a;
    background: #313244;
    color: #cdd6f4;
    font-size: 13px;
    outline: none;
    cursor: pointer;
    font-family: inherit;
    min-width: 140px;
    transition: border-color 0.15s;
  }

  .filter-select:focus { border-color: #89b4fa; }

  .filter-select option { background: #313244; color: #cdd6f4; }
  .filter-select optgroup { color: #6c7086; font-style: normal; }

  .dialog-body {
    overflow-y: auto;
    padding: 16px 24px 24px;
    flex: 1;
  }

  .dialog-group {
    margin-bottom: 20px;
  }

  .dialog-group:last-child { margin-bottom: 0; }

  .dialog-group-header {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: #a6adc8;
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid #313244;
  }

  .dialog-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 8px;
  }

  .dialog-card {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid #313244;
    background: #181825;
    color: #cdd6f4;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
    font-family: inherit;
    font-size: inherit;
  }

  .dialog-card:hover {
    background: #313244;
    border-color: #585b70;
  }

  .dialog-card.active {
    border-color: #89b4fa;
    background: #1e3a5f;
  }

  .dialog-card-title {
    font-size: 13px;
    font-weight: 600;
    color: #cdd6f4;
    margin-bottom: 2px;
  }

  .dialog-card-desc {
    font-size: 11px;
    color: #6c7086;
    line-height: 1.4;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    width: 100%;
  }

  .dialog-card-meta {
    display: flex;
    gap: 4px;
    margin-top: 4px;
    flex-wrap: wrap;
  }

  .card-target {
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 4px;
    background: #313244;
    color: #6c7086;
  }

  .card-feature {
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 4px;
    background: #1e3a5f;
    color: #89b4fa;
  }

  /* WAT highlighting */
  .wat-keyword { color: #cba6f7; }
  .wat-type { color: #89b4fa; }
  .wat-number { color: #fab387; }
  .wat-string { color: #a6e3a1; }
  .wat-annotation { color: #585b70; }
  .wat-name { color: #f9e2af; }

  /* C/Decompiled highlighting */
  .c-keyword { color: #cba6f7; font-weight: 600; }
  .c-type { color: #89b4fa; }
  .c-number { color: #fab387; }
  .c-string { color: #a6e3a1; }
  .c-comment { color: #6c7086; font-style: italic; }
  .c-function { color: #89dceb; }
  .c-function-link { cursor: pointer; text-decoration: underline; text-decoration-style: dotted; text-underline-offset: 2px; }
  .c-function-link:hover { color: #b4befe; text-decoration-style: solid; }
  .c-variable { color: #cdd6f4; }
  .c-global { color: #f38ba8; font-style: italic; }
  .c-memory { color: #fab387; font-weight: 600; }
  .c-operator { color: #89dceb; }
  .c-cast { color: #74c7ec; }
  .c-brace { color: #a6adc8; }
  .c-punct { color: #a6adc8; }

  /* ─── Editor/Explorer mode containers ─── */

  #editorMode {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #explorerMode {
    flex: 1;
    overflow: hidden;
  }

  /* ─── Mode toggle ─── */

  .mode-toggle {
    display: flex;
    gap: 2px;
    margin-left: 8px;
    background: #181825;
    border-radius: 6px;
    padding: 2px;
  }

  .mode-btn {
    padding: 4px 12px;
    font-size: 12px;
    border: none;
    border-radius: 4px;
    background: transparent;
    color: #6c7086;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }

  .mode-btn.active {
    background: #313244;
    color: #cdd6f4;
  }

  .mode-btn:hover:not(.active) {
    color: #a6adc8;
  }

  /* ─── Explorer layout ─── */

  .explorer-container {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 50px);
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 13px;
  }

  .explorer-split {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  .explorer-tree-pane {
    width: 320px;
    min-width: 200px;
    max-width: 50%;
    background: #1e1e2e;
    border-right: 1px solid #313244;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  .explorer-detail-pane {
    flex: 1;
    overflow-y: auto;
    background: #1e1e2e;
    padding: 0;
  }

  .explorer-resize-handle {
    width: 4px;
    cursor: col-resize;
    background: transparent;
    flex-shrink: 0;
    transition: background 0.15s;
  }

  .explorer-resize-handle:hover {
    background: #585b70;
  }

  /* ─── Explorer toolbar ─── */

  .explorer-toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-bottom: 1px solid #313244;
    background: #181825;
    flex-shrink: 0;
  }

  .explorer-file-label {
    font-size: 13px;
    font-weight: 500;
    color: #a6adc8;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  .explorer-size-label {
    font-size: 11px;
    color: #585b70;
    white-space: nowrap;
  }

  .explorer-load-btn {
    font-size: 11px;
    padding: 4px 12px;
    border: 1px solid #313244;
    border-radius: 4px;
    background: #181825;
    color: #a6adc8;
    cursor: pointer;
    white-space: nowrap;
    font-family: inherit;
    transition: all 0.15s;
  }

  .explorer-load-btn:hover {
    background: #313244;
    color: #cdd6f4;
  }

  /* ─── Drop zone ─── */

  .explorer-drop-zone {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #585b70;
    gap: 16px;
    padding: 40px;
    text-align: center;
    cursor: pointer;
    transition: background 0.15s;
  }

  .explorer-drop-zone:hover {
    background: rgba(69, 71, 90, 0.2);
  }

  .explorer-drop-zone.drag-over {
    background: rgba(137, 180, 250, 0.1);
    border: 2px dashed #89b4fa;
  }

  .drop-zone-icon { font-size: 48px; opacity: 0.4; }
  .drop-zone-hint { font-size: 12px; color: #45475a; }
  .drop-zone-message { font-size: 14px; color: #6c7086; }

  .explorer-error {
    padding: 20px;
    color: #f38ba8;
    font-size: 13px;
  }

  .explorer-retry-btn {
    margin-top: 12px;
    padding: 6px 16px;
    border: 1px solid #313244;
    border-radius: 4px;
    background: #181825;
    color: #a6adc8;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }

  .explorer-retry-btn:hover {
    background: #313244;
    color: #cdd6f4;
  }

  /* ─── Tree view ─── */

  .explorer-tree {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    font-size: 13px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  }

  .explorer-tree-search {
    width: 100%;
    padding: 6px 10px;
    border: none;
    border-bottom: 1px solid #313244;
    background: #181825;
    color: #cdd6f4;
    font-size: 12px;
    font-family: inherit;
    outline: none;
    box-sizing: border-box;
    flex-shrink: 0;
  }

  .explorer-tree-search::placeholder { color: #585b70; }

  .tree-row {
    display: flex;
    align-items: center;
    padding: 1px 8px;
    cursor: pointer;
    white-space: nowrap;
    color: #cdd6f4;
    line-height: 1.4;
    user-select: none;
    font-size: 12px;
    transition: background 0.1s;
  }

  .tree-row:hover { background: #313244; }
  .tree-row.selected { background: #45475a; }

  .tree-chevron {
    width: 16px;
    text-align: center;
    font-size: 10px;
    color: #585b70;
    flex-shrink: 0;
    cursor: pointer;
  }

  .tree-chevron-spacer { width: 16px; flex-shrink: 0; }
  .tree-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }

  /* ─── Detail panel ─── */

  .explorer-detail {
    padding: 0;
  }

  .explorer-breadcrumbs {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 8px 16px;
    border-bottom: 1px solid #313244;
    font-size: 12px;
    color: #585b70;
    background: #181825;
    flex-shrink: 0;
    position: sticky;
    top: 0;
    z-index: 1;
  }

  .breadcrumb-link { color: #89b4fa; cursor: pointer; text-decoration: none; }
  .breadcrumb-link:hover { text-decoration: underline; }
  .breadcrumb-separator { color: #45475a; }
  .breadcrumb-current { color: #cdd6f4; }

  .detail-heading {
    font-size: 16px;
    font-weight: 600;
    color: #cdd6f4;
    margin: 0 0 12px 0;
    padding: 16px 16px 0 16px;
  }

  .detail-subheading {
    font-size: 13px;
    font-weight: 600;
    color: #a6adc8;
    margin: 16px 0 8px 0;
    padding: 0 16px;
  }

  .detail-description {
    font-size: 12px;
    color: #6c7086;
    padding: 0 16px;
    margin-bottom: 8px;
  }

  /* ─── Info table ─── */

  .detail-info-table {
    width: 100%;
    margin: 0 0 8px 0;
    font-size: 13px;
  }

  .detail-info-row {
    display: flex;
    border-bottom: 1px solid #181825;
  }

  .detail-info-label {
    padding: 4px 16px;
    color: #6c7086;
    white-space: nowrap;
    font-size: 12px;
    flex: 0 0 140px;
  }

  .detail-info-value {
    padding: 4px 16px;
    color: #cdd6f4;
    word-break: break-all;
    font-size: 13px;
    flex: 1;
    min-width: 0;
  }

  .detail-info-link {
    color: #89b4fa;
    cursor: pointer;
    text-decoration: none;
    padding: 4px 16px;
    flex: 0 0 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .detail-info-link { color: #89b4fa; cursor: pointer; text-decoration: none; }
  .detail-info-link:hover { text-decoration: underline; }

  .complexity-header {
    background: #181825;
    border-bottom: 1px solid #313244;
  }

  .complexity-header-cell {
    padding: 6px 16px;
    color: #585b70;
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    white-space: nowrap;
    flex: 0 0 100px;
    text-align: right;
  }

  .complexity-header-cell:first-child {
    flex: 0 0 200px;
    text-align: left;
  }

  /* ─── Call list ─── */

  .detail-call-list {
    padding: 4px 16px;
    font-size: 12px;
    line-height: 1.8;
  }

  .detail-call-label { color: #6c7086; font-weight: 600; }

  /* ─── Code view ─── */

  .detail-code {
    background: #11111b;
    border: 1px solid #313244;
    border-radius: 6px;
    padding: 8px 0;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 12px;
    line-height: 1.5;
    overflow-x: auto;
    margin: 8px 16px;
  }

  .code-line {
    display: flex;
    padding: 0 12px;
  }

  .code-line:hover { background: #1e1e2e; }

  .code-line-number {
    color: #45475a;
    text-align: right;
    padding-right: 12px;
    min-width: 3ch;
    user-select: none;
    flex-shrink: 0;
  }

  .code-line-content { white-space: pre; }

  .detail-block-wrapper { position: relative; }

  .detail-copy-btn {
    position: absolute;
    top: 12px;
    right: 24px;
    padding: 3px 8px;
    font-size: 11px;
    border: 1px solid #313244;
    border-radius: 4px;
    background: #1e1e2e;
    color: #6c7086;
    cursor: pointer;
    opacity: 0.6;
    z-index: 1;
    font-family: inherit;
    transition: all 0.15s;
  }

  .detail-copy-btn:hover {
    opacity: 1;
    background: #313244;
    color: #cdd6f4;
  }

  .detail-truncated {
    padding: 8px 16px;
    font-size: 11px;
    color: #585b70;
    font-style: italic;
  }

  /* ─── Hex view ─── */

  .detail-hex {
    background: #11111b;
    border: 1px solid #313244;
    border-radius: 6px;
    padding: 8px 12px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 12px;
    line-height: 1.6;
    overflow-x: auto;
    margin: 8px 16px;
    word-break: break-all;
  }

  .hex-address { color: #585b70; margin-right: 12px; user-select: none; }
  .hex-ascii { color: #45475a; margin-left: 12px; }
  .hex-opcode { color: #89b4fa; }
  .hex-immediate { color: #a6e3a1; }
  .detail-byte-range-info { padding: 4px 16px; font-size: 11px; color: #585b70; }

  /* ─── Function tabs ─── */

  .func-tab-container { margin: 8px 16px; }

  .func-tab-bar {
    display: flex;
    gap: 0;
    border-bottom: 1px solid #313244;
    margin-bottom: 0;
  }

  .func-tab-btn {
    padding: 6px 16px;
    font-size: 12px;
    border: none;
    border-bottom: 2px solid transparent;
    background: transparent;
    color: #6c7086;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }

  .func-tab-btn:hover { color: #a6adc8; }
  .func-tab-btn.active { color: #cdd6f4; border-bottom-color: #89b4fa; }
  .func-tab-content { min-height: 100px; }

  /* ─── Size bars ─── */

  .size-bar-container {
    flex: 1;
    height: 6px;
    background: #181825;
    border-radius: 3px;
    overflow: hidden;
    min-width: 60px;
    align-self: center;
  }

  .size-bar {
    height: 100%;
    background: #89b4fa;
    border-radius: 3px;
    min-width: 2px;
  }

  /* ─── String/WAT search ─── */

  .explorer-wat-search {
    width: 100%;
    padding: 6px 10px;
    border: none;
    border-bottom: 1px solid #313244;
    background: #181825;
    color: #cdd6f4;
    font-size: 12px;
    font-family: inherit;
    outline: none;
    box-sizing: border-box;
  }

  .explorer-wat-search::placeholder { color: #585b70; }

  .search-result-row {
    display: flex;
    padding: 4px 16px;
    cursor: pointer;
    font-size: 12px;
    border-bottom: 1px solid #181825;
    transition: background 0.1s;
  }

  .search-result-row:hover { background: #313244; }
  .search-result-line { color: #585b70; min-width: 48px; }

  .detail-string-value {
    color: #a6e3a1;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 12px;
    word-break: break-all;
  }

  /* ─── Source tab ─── */

  .source-file-label {
    font-size: 12px;
    font-weight: 600;
    color: #89b4fa;
    padding: 8px 12px;
    border-bottom: 1px solid #313244;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  }

  .source-highlight { background: rgba(166, 227, 161, 0.12); }

  .detail-placeholder {
    padding: 16px;
    color: #6c7086;
    font-size: 13px;
    font-style: italic;
  }
</style>
</head>
<body>

      <span id="currentExample">Hello WASM</span>

    </button>

      <button class="mode-btn active" data-mode="editor">Editor</button>
      <button class="mode-btn" data-mode="explorer">Explorer</button>
    </div>

    <a class="github-link" href="https://github.com/DevNamedZed/webasmjs" target="_blank" rel="noopener">

      GitHub
    </a>
  </header>
  <div id="editorMode">
    <div class="main">
      <div class="editor-pane">
        <div class="pane-header">
          <div class="lang-toggle" id="langToggle">
            <button class="lang-btn active" data-lang="js">JS</button>
            <button class="lang-btn" data-lang="ts">TS</button>
          </div>
        </div>
        <textarea id="editor" spellcheck="false"></textarea>
      </div>
      <div class="resize-handle" id="resizeHandle"></div>
      <div class="wat-pane" id="watPane">
        <div class="pane-toggle" id="watToggle">
          <span class="pane-chevron">&#9662;</span>
          <span class="pane-label">WAT</span>
        </div>
        <div class="wat-body" id="watBody"></div>
      </div>
    </div>
  </div>
  <div id="explorerMode" style="display:none;">

  <div class="output-pane" id="outputPane">

      <span class="pane-chevron">&#9662;</span>
      <span class="pane-label">Output</span>
      <button class="pane-clear" id="outputClear">Clear</button>

    <div class="output-body" id="outputBody"></div>
  </div>
  <script src="playground.bundle.js"></script>
